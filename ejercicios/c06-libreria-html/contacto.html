<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">📚 Librería</a>
  </div>
</nav>

<div class="container mt-4">
  <form>
    <input class="form-control mb-2" placeholder="Nombre" required>
    <input class="form-control mb-2" type="email" placeholder="Email" required>

    <select class="form-control mb-2">
      <option>Consulta</option>
      <option>Reclamo</option>
      <option>Sugerencia</option>
    </select>

    <textarea class="form-control mb-2" placeholder="Mensaje" required></textarea>

    <button class="btn btn-primary">Enviar</button>
  </form>
</div>

</body>
</html>
